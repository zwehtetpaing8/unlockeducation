<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    width: 200px;
    height: 100px;
    overflow-x: auto;
    border: 1px solid black;
  }
  .inner {
    display: flex;
    justify-content: center;
    width: max-content;
  }
  .box {
    width: 100px;
    height: 50px;
    background: red;
    margin: 5px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="inner">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>
</div>
</body>
</html>
