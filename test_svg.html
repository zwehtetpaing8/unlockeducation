<!DOCTYPE html>
<html>
<body>

    </defs>
    <polygon points="60,160 220,160 240,80 80,80" fill="none" stroke="#64748b" strokeWidth="1.5" />

    <line x1="100" y1="135" x2="100" y2="170" stroke="#0f172a" strokeWidth="1.5" strokeDasharray="4 2" />

    <path d="M 100 125 L 108 123 L 108 133" fill="none" stroke="#0f172a" strokeWidth="1" />
    
    <!-- Point P -->
    <circle cx="100" cy="135" r="3" fill="#0f172a" />

    <circle cx="100" cy="40" r="3" fill="#0f172a" />
    <text x="110" y="45" fontSize="11" fill="#0f172a">(-1, 3, 2)</text>

    <!-- Direction vector -->
    <line x1="75" y1="60" x2="75" y2="100" stroke="#0f172a" strokeWidth="1.5" markerEnd="url(#arrow-ex9)" />
    <text x="35" y="85" fontSize="11" fill="#0f172a" font-family="serif">d</text>
    <text x="45" y="85" fontSize="10" fill="#64748b">= ⟨3, -2, -1⟩</text>
  </svg>
