<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    width: 200px;
    height: 100px;
    overflow-x: auto;
    border: 1px solid black;
    text-align: center;
  }
  .content {
    white-space: nowrap;
  }
  .katex-display {
    text-align: center;
    display: block;
  }
</style>
</head>
<body>
<div class="container">
  <div class="katex-display">
    <span class="content">This is a very long math equation that might get clipped on the left side.</span>
  </div>
</div>
</body>
</html>
